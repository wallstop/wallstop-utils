name: Script Quality

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_shell_debt_audit:
        description: "Run a non-blocking full-repo shell debt audit (shellcheck + shfmt)."
        required: false
        default: false
        type: boolean
      run_windows_deep_audit:
        description: "Run full-repo Windows language validation (AutoHotkey + batch) on demand."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: script-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit-linux:
    name: pre-commit full repo (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Python
        id: setup_python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'requirements.txt') }}

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Assert pre-commit availability
        run: pre-commit --version

      - name: Run deterministic non-shell hooks on full repository
        shell: bash
        run: |
          set -euo pipefail

          precommit_log="$RUNNER_TEMP/precommit-deterministic.log"
          clean_precommit_log="$RUNNER_TEMP/precommit-deterministic.clean.log"
          if SKIP=shellcheck,shfmt pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure --color always 2>&1 | tee "$precommit_log"; then
            exit 0
          fi

          # Strip ANSI escape sequences so downstream parsing is deterministic.
          # GNU/BSD sed do not portably treat \033 as ESC in ERE mode, so use the
          # Python already provisioned for this job.
          python - "$precommit_log" "$clean_precommit_log" <<'PY'
          import pathlib
          import re
          import sys

          source_path = pathlib.Path(sys.argv[1])
          destination_path = pathlib.Path(sys.argv[2])
          text = source_path.read_text(encoding="utf-8", errors="replace")
          text = re.sub(r"\x1b\[[0-9;]*[A-Za-z]", "", text)
          text = text.replace("\r\n", "\n").replace("\r", "")
          destination_path.write_text(text, encoding="utf-8")
          PY

          autofix_hook_ids="$(
            awk '
              /^[[:space:]]*- hook id:[[:space:]]*/ {
                current = $0
                sub(/^[[:space:]]*- hook id:[[:space:]]*/, "", current)
                sub(/[[:space:]].*$/, "", current)
                next
              }
              /^[[:space:]]*- files were modified by this hook[[:space:]]*$/ {
                if (current != "") {
                  print current
                }
              }
            ' "$clean_precommit_log" | sort -u | tr '\n' ',' | sed 's/,$//'
          )"

          failed_hook_ids="$(
            awk '
              /^[[:space:]]*- hook id:[[:space:]]*/ {
                current = $0
                sub(/^[[:space:]]*- hook id:[[:space:]]*/, "", current)
                sub(/[[:space:]].*$/, "", current)
                next
              }
              /^[[:space:]]*- exit code:[[:space:]]*[1-9]/ {
                if (current != "") {
                  print current
                  current = ""
                }
              }
              /^[^[:space:]-]/ {
                current = ""
              }
            ' "$clean_precommit_log" | sort -u | tr '\n' ',' | sed 's/,$//'
          )"

          if [[ -n "$autofix_hook_ids" ]]; then
            echo "::error::E_CI_PRECOMMIT_AUTOFIX_REQUIRED: pre-commit hooks modified files. Run 'pre-commit run --all-files' locally and commit the resulting changes."
            echo "::notice::Auto-fix hook(s): $autofix_hook_ids"

            mapfile -t formatted_files < <(
              sed -n -E 's/^[[:space:]]*(Formatted[[:space:]]+|Fixing( file)?[[:space:]]+)//p' "$clean_precommit_log" |
                sed '/^[[:space:]]*$/d' |
                sort -u
            )
            if [[ ${#formatted_files[@]} -gt 0 ]]; then
              echo "::group::Auto-formatted files"
              printf '%s\n' "${formatted_files[@]}"
              echo "::endgroup::"
            fi
          fi

          if [[ -n "$failed_hook_ids" ]]; then
            mapfile -t non_autofix_failed_hooks < <(
              comm -23 \
                <(printf '%s\n' "$failed_hook_ids" | tr ',' '\n' | sed '/^$/d' | sort -u) \
                <(printf '%s\n' "$autofix_hook_ids" | tr ',' '\n' | sed '/^$/d' | sort -u)
            )

            if [[ ${#non_autofix_failed_hooks[@]} -gt 0 ]]; then
              echo "::error::E_CI_PRECOMMIT_HOOK_FAILURE: Non-autofix hook failure(s): ${non_autofix_failed_hooks[*]}"
            fi
          fi

          exit 1

      - name: Run LLM harness validator explicitly
        shell: pwsh
        run: ./Scripts/Utils/Quality/Test-LlmHarness.ps1

      - name: Security pattern checks
        shell: bash
        run: |
          set -euo pipefail

          echo "Security scanner diagnostics:"
          echo "  rg_available=$(command -v rg >/dev/null 2>&1 && echo yes || echo no)"
          if grep --version >/dev/null 2>&1; then
            echo "  grep_version=$(grep --version | head -1)"
          else
            echo "  grep_version=BSD_or_non-GNU"
          fi

          mapfile -d '' scan_files < <(
            git ls-files -z -- .
          )

          command_scan_files=()
          for scan_file in "${scan_files[@]}"; do
            # Bash case patterns are string matches; Tests/* intentionally covers the
            # whole root Tests tree because * matches / here.
            case "$scan_file" in
              Tests/*|*.md|.llm/*)
                continue
                ;;
            esac

            command_scan_files+=("$scan_file")
          done

          echo "  tracked_file_count=${#scan_files[@]}"
          echo "  command_file_count=${#command_scan_files[@]}"
          if [[ ${#scan_files[@]} -eq 0 ]]; then
            echo "No tracked files selected for security pattern scanning."
            exit 0
          fi

          token_pattern_rg='gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}'
          bearer_pattern_rg='Authorization:\s*(Bearer|token)\s+[A-Za-z0-9._-]{20,}'
          secret_pattern_rg="(${token_pattern_rg}|${bearer_pattern_rg})"
          invoke_expression_pattern="Invoke-""Expression"
          iex_alias_pattern="i""ex"
          # shellcheck disable=SC2016 # Reason: regex intentionally includes a literal end-of-line anchor '$'.
          dangerous_pattern_rg="${invoke_expression_pattern}"'|(^|[^[:alnum:]_])'"${iex_alias_pattern}"'([^[:alnum:]_]|$)'
          combined_rg="(${secret_pattern_rg}|${dangerous_pattern_rg})"

          token_pattern_grep='gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}'
          bearer_pattern_grep='Authorization:[[:space:]]*(Bearer|token)[[:space:]]+[A-Za-z0-9._-]{20,}'
          secret_pattern_grep="(${token_pattern_grep}|${bearer_pattern_grep})"
          # shellcheck disable=SC2016 # Reason: regex intentionally includes a literal end-of-line anchor '$'.
          dangerous_pattern_grep="${invoke_expression_pattern}"'|(^|[^[:alnum:]_])'"${iex_alias_pattern}"'([^[:alnum:]_]|$)'
          combined_grep="(${secret_pattern_grep}|${dangerous_pattern_grep})"

          if command -v rg >/dev/null 2>&1; then
            scanner_engine="rg"
            active_pattern="$combined_rg"
            secret_pattern="$secret_pattern_rg"
            dangerous_pattern="$dangerous_pattern_rg"
          else
            scanner_engine="grep"
            active_pattern="$combined_grep"
            secret_pattern="$secret_pattern_grep"
            dangerous_pattern="$dangerous_pattern_grep"
          fi

          run_scan() {
            local pattern="$1"
            shift

            if [[ $# -eq 0 ]]; then
              return 0
            fi

            if [[ "$scanner_engine" == "rg" ]]; then
              rg -n "$pattern" -- "$@" || true
            else
              grep -InE "$pattern" -- "$@" || true
            fi
          }

          secret_matches="$(run_scan "$secret_pattern" "${scan_files[@]}")"
          dangerous_matches="$(run_scan "$dangerous_pattern" "${command_scan_files[@]}")"
          matches="$(
            {
              printf '%s\n' "$secret_matches"
              printf '%s\n' "$dangerous_matches"
            } | sed '/^$/d'
          )"

          if [[ -n "$dangerous_matches" ]]; then
            {
              echo "::group::Command-execution scanner scope"
              printf '%s\n' "${command_scan_files[@]}"
              echo "::endgroup::"
            }
          fi

          match_count=0
          if [[ -n "$matches" ]]; then
            match_count="$(printf '%s\n' "$matches" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          fi

          echo "  scanner_engine=$scanner_engine"
          echo "  active_pattern=$active_pattern"
          echo "  match_count=$match_count"

          # Engine-level behavior corpus to catch false positives and drift.
          sample_ghp="gh""p_0123456789abcdef0123456789abcdef0123"
          sample_ghs="gh""s_0123456789abcdef0123"
          sample_gho="gh""o_0123456789abcdef0123"
          sample_ghu="gh""u_0123456789abcdef0123"
          sample_ghr="gh""r_0123456789abcdef0123"
          should_detect=(
            "Authorization: token ${sample_ghp}"
            "example-token: ${sample_ghs}"
            "example-token: ${sample_gho}"
            "example-token: ${sample_ghu}"
            "example-token: ${sample_ghr}"
            "${invoke_expression_pattern} \"Write-Host demo\""
          )
          # shellcheck disable=SC2016 # Reason: corpus samples are literal PowerShell snippets and must keep '$' unexpanded.
          should_ignore=(
            '$redacted = $redacted -replace "gh[pousr]_[A-Za-z0-9_]{20,}", "***REDACTED***"'
            'Write-Host "hello"'
          )

          for sample in "${should_detect[@]}"; do
            if [[ "$scanner_engine" == "rg" ]]; then
              if ! printf '%s\n' "$sample" | rg -n "$active_pattern" >/dev/null; then
                echo "Scanner corpus failure: expected a match but none was found"
                echo "Sample: $sample"
                exit 1
              fi
            else
              if ! printf '%s\n' "$sample" | grep -nE "$active_pattern" >/dev/null; then
                echo "Scanner corpus failure: expected a match but none was found"
                echo "Sample: $sample"
                exit 1
              fi
            fi
          done

          for sample in "${should_ignore[@]}"; do
            if [[ "$scanner_engine" == "rg" ]]; then
              if printf '%s\n' "$sample" | rg -n "$active_pattern" >/dev/null; then
                echo "Scanner corpus failure: expected no match but a match was found"
                echo "Sample: $sample"
                exit 1
              fi
            else
              if printf '%s\n' "$sample" | grep -nE "$active_pattern" >/dev/null; then
                echo "Scanner corpus failure: expected no match but a match was found"
                echo "Sample: $sample"
                exit 1
              fi
            fi
          done

          if [[ -n "$matches" ]]; then
            echo "Disallowed token or command pattern detected"
            printf '%s\n' "$matches"
            exit 1
          fi

      - name: Generated artifact tracking checks
        shell: bash
        run: |
          set -euo pipefail

          tracked_artifacts="$(git ls-files coverage.xml out.txt || true)"
          if [[ -n "$tracked_artifacts" ]]; then
            echo "Generated artifact files must not be tracked in git:"
            printf '%s\n' "$tracked_artifacts"
            exit 1
          fi

      - name: Run shell hooks on changed files
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          from_ref=""
          to_ref="$GIT_SHA"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ -z "$BASE_REF" ]]; then
              echo "Pull request event is missing BASE_REF; failing shell changed-file checks."
              exit 1
            fi
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            from_ref="origin/$BASE_REF"
          elif [[ -n "$EVENT_BEFORE" && "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            from_ref="$EVENT_BEFORE"
          else
            head_parent="$(git rev-parse --verify HEAD^ 2>/dev/null || true)"
            if [[ -n "$head_parent" ]]; then
              from_ref="$head_parent"
            fi
          fi

          if [[ -z "$from_ref" ]]; then
            echo "No baseline commit available; running shell checks for tracked shell targets in HEAD."
            mapfile -t changed_shell_files < <(
              git ls-files | grep -E '^(Scripts/.*\.sh|\.devcontainer/.*\.sh|\.githooks/(pre-commit|pre-push))$' || true
            )
            if [[ ${#changed_shell_files[@]} -eq 0 ]]; then
              echo "No shell target files found; skipping shellcheck/shfmt."
              exit 0
            fi
            pre-commit run --hook-stage pre-commit shellcheck --files "${changed_shell_files[@]}" --show-diff-on-failure --color always
            pre-commit run --hook-stage pre-commit shfmt --files "${changed_shell_files[@]}" --show-diff-on-failure --color always
            exit 0
          fi

          mapfile -t changed_shell_files < <(
            git diff --name-only "$from_ref" "$to_ref" | grep -E '^(Scripts/.*\.sh|\.devcontainer/.*\.sh|\.githooks/(pre-commit|pre-push))$' || true
          )

          if [[ ${#changed_shell_files[@]} -eq 0 ]]; then
            echo "No changed shell targets in range $from_ref..$to_ref; skipping shellcheck/shfmt."
            exit 0
          fi

          pre-commit run --hook-stage pre-commit shellcheck --files "${changed_shell_files[@]}" --show-diff-on-failure --color always
          pre-commit run --hook-stage pre-commit shfmt --files "${changed_shell_files[@]}" --show-diff-on-failure --color always

      - name: Assert clean tree after pre-commit
        shell: pwsh
        run: ./Scripts/Utils/Quality/Assert-CleanGitTree.ps1 -Context "Linux pre-commit full-repo checks"

  shell-debt-audit:
    name: Shell debt audit (manual, non-blocking)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_shell_debt_audit == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        id: setup_python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml', 'requirements.txt') }}

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Run full-repo shell debt audit
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          echo "Running non-blocking shell debt audit across the full repository."
          pre-commit run --all-files --hook-stage pre-commit shellcheck --show-diff-on-failure --color always 2>&1 | tee shellcheck-audit.log || true
          pre-commit run --all-files --hook-stage pre-commit shfmt --show-diff-on-failure --color always 2>&1 | tee shfmt-audit.log || true

      - name: Summarize shell debt telemetry
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f shellcheck-audit.log ]]; then
            echo "No shellcheck audit log produced."
            exit 0
          fi

          mapfile -t codes < <(grep -oE 'SC[0-9]{4}' shellcheck-audit.log | sort | uniq -c || true)

          {
            echo "## Shell Debt Telemetry"
            echo
            if [[ ${#codes[@]} -eq 0 ]]; then
              echo "No shellcheck codes reported in this audit run."
            else
              echo "Detected shellcheck code counts (non-blocking audit):"
              echo
              echo '```text'
              printf '%s\n' "${codes[@]}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  windows-language:
    name: Windows language validation (PR fast lane)
    if: ${{ github.event_name != 'schedule' }}
    runs-on: windows-latest
    timeout-minutes: 6
    env:
      AHK_RUNTIME_VERSION: "2.0.19"
      AHK_RUNTIME_ZIP_SHA256: "4e0d0e65655066a646a210951320feaef0729a3597177131adaec4066bef5869"
      AHK_RUNTIME_EXE_SHA256: "3880f9ec464dfe78c16bbd8b9f30560227154c292280337346a30c8fd92871fe"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed Windows language targets
        id: detect_windows_targets
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_BEFORE: ${{ github.event.before }}
          GIT_SHA: ${{ github.sha }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $targetPattern = '^(Scripts/AutoHotKey/.*\.ahk|Config/\.config/.*\.ahk|Scripts/.*\.bat)$'
          $fromRef = ""
          $toRef = $env:GIT_SHA
          $changedTargets = @()

          if ($env:EVENT_NAME -eq "pull_request") {
            if ([string]::IsNullOrWhiteSpace($env:BASE_REF)) {
              throw "Pull request event is missing BASE_REF; failing Windows changed-file checks."
            }

            git fetch --no-tags --depth=1 origin $env:BASE_REF
            $fromRef = "origin/$($env:BASE_REF)"
          } elseif (-not [string]::IsNullOrWhiteSpace($env:EVENT_BEFORE) -and $env:EVENT_BEFORE -ne "0000000000000000000000000000000000000000") {
            $fromRef = $env:EVENT_BEFORE
          } else {
            $headParentCandidate = (git rev-parse --verify HEAD^ 2>$null)
            if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($headParentCandidate)) {
              $fromRef = $headParentCandidate.Trim()
            }
          }

          if ([string]::IsNullOrWhiteSpace($fromRef)) {
            Write-Warning "W_GIT_BASELINE_UNAVAILABLE: No baseline commit available; running Windows checks for tracked targets in HEAD."
            $changedTargets = @(git ls-files | Where-Object { $_ -match $targetPattern })
          } else {
            $changedTargets = @(git diff --name-only $fromRef $toRef | Where-Object { $_ -match $targetPattern })
          }

          $changedTargets = @(
            $changedTargets |
              ForEach-Object { $_.Trim() } |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Sort-Object -Unique
          )

          if ($changedTargets.Count -eq 0) {
            "has_changes=false" >> $env:GITHUB_OUTPUT
            "target_count=0" >> $env:GITHUB_OUTPUT
            "target_files<<EOF" >> $env:GITHUB_OUTPUT
            "" >> $env:GITHUB_OUTPUT
            "EOF" >> $env:GITHUB_OUTPUT
            Write-Host "No changed Windows language targets detected; Windows checks will be skipped."
            return
          }

          "has_changes=true" >> $env:GITHUB_OUTPUT
          "target_count=$($changedTargets.Count)" >> $env:GITHUB_OUTPUT
          "target_files<<EOF" >> $env:GITHUB_OUTPUT
          $changedTargets | ForEach-Object { "$_" >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

          Write-Host "Detected $($changedTargets.Count) changed Windows language target(s)."

      - name: Skip Windows language checks (no Windows targets changed)
        if: ${{ steps.detect_windows_targets.outputs.has_changes != 'true' }}
        shell: pwsh
        run: |
          Write-Host "Windows checks skipped because no *.ahk or *.bat targets changed in this event scope."

      - name: Cache AutoHotkey portable runtime
        if: ${{ steps.detect_windows_targets.outputs.has_changes == 'true' }}
        uses: actions/cache@v6.0.0
        with:
          path: ${{ runner.temp }}/autohotkey-portable-${{ env.AHK_RUNTIME_VERSION }}
          key: autohotkey-portable-${{ runner.os }}-${{ env.AHK_RUNTIME_VERSION }}

      - name: Setup AutoHotkey portable runtime
        if: ${{ steps.detect_windows_targets.outputs.has_changes == 'true' }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $version = $env:AHK_RUNTIME_VERSION
          $installRoot = Join-Path -Path $env:RUNNER_TEMP -ChildPath "autohotkey-portable-$version"
          $exePath = Join-Path -Path $installRoot -ChildPath "AutoHotkey64.exe"

          if (-not (Test-Path -Path $exePath -PathType Leaf)) {
            New-Item -Path $installRoot -ItemType Directory -Force | Out-Null
            $archivePath = Join-Path -Path $env:RUNNER_TEMP -ChildPath "AutoHotkey_$version.zip"
            $downloadUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$version/AutoHotkey_$version.zip"

            Write-Host "Downloading AutoHotkey portable runtime from $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath

            $expectedArchiveSha256 = $env:AHK_RUNTIME_ZIP_SHA256.ToLowerInvariant()
            $actualArchiveSha256 = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualArchiveSha256 -ne $expectedArchiveSha256) {
              throw "E_AHK_RUNTIME_HASH_MISMATCH: AutoHotkey archive hash mismatch. expected=$expectedArchiveSha256 actual=$actualArchiveSha256 archivePath=$archivePath"
            }

            Expand-Archive -Path $archivePath -DestinationPath $installRoot -Force
          }

          if (-not (Test-Path -Path $exePath -PathType Leaf)) {
            throw "E_AHK_RUNTIME_UNAVAILABLE: Expected AutoHotkey64.exe at '$exePath' after setup."
          }

          $expectedExeSha256 = $env:AHK_RUNTIME_EXE_SHA256.ToLowerInvariant()
          $actualExeSha256 = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualExeSha256 -ne $expectedExeSha256) {
            throw "E_AHK_RUNTIME_HASH_MISMATCH: AutoHotkey executable hash mismatch. expected=$expectedExeSha256 actual=$actualExeSha256 exePath=$exePath"
          }

          $installRoot >> $env:GITHUB_PATH
          Write-Host "AutoHotkey runtime ready at: $exePath"

      - name: Run Windows language checks (targeted)
        if: ${{ steps.detect_windows_targets.outputs.has_changes == 'true' }}
        shell: pwsh
        env:
          WINDOWS_TARGET_FILES: ${{ steps.detect_windows_targets.outputs.target_files }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $start = Get-Date
          ./Scripts/Utils/Quality/Invoke-WindowsLanguageChecks.ps1 -TargetFiles $env:WINDOWS_TARGET_FILES -RequireAutoHotkey
          $elapsedSeconds = [int]([Math]::Round(((Get-Date) - $start).TotalSeconds, 0))

          Write-Host "Windows language checks duration: $elapsedSeconds seconds"
          if ($elapsedSeconds -gt 180) {
            throw "E_CI_TIME_BUDGET: Windows PR lane exceeded 180-second budget ($elapsedSeconds seconds)."
          }

      - name: Assert clean tree after Windows checks
        if: ${{ steps.detect_windows_targets.outputs.has_changes == 'true' }}
        shell: pwsh
        run: ./Scripts/Utils/Quality/Assert-CleanGitTree.ps1 -Context "Windows language checks"

  windows-language-nightly:
    name: Windows language validation (nightly deep lane)
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_windows_deep_audit == true) }}
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      AHK_RUNTIME_VERSION: "2.0.19"
      AHK_RUNTIME_ZIP_SHA256: "4e0d0e65655066a646a210951320feaef0729a3597177131adaec4066bef5869"
      AHK_RUNTIME_EXE_SHA256: "3880f9ec464dfe78c16bbd8b9f30560227154c292280337346a30c8fd92871fe"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Cache AutoHotkey portable runtime
        uses: actions/cache@v6.0.0
        with:
          path: ${{ runner.temp }}/autohotkey-portable-${{ env.AHK_RUNTIME_VERSION }}
          key: autohotkey-portable-${{ runner.os }}-${{ env.AHK_RUNTIME_VERSION }}

      - name: Setup AutoHotkey portable runtime
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $version = $env:AHK_RUNTIME_VERSION
          $installRoot = Join-Path -Path $env:RUNNER_TEMP -ChildPath "autohotkey-portable-$version"
          $exePath = Join-Path -Path $installRoot -ChildPath "AutoHotkey64.exe"

          if (-not (Test-Path -Path $exePath -PathType Leaf)) {
            New-Item -Path $installRoot -ItemType Directory -Force | Out-Null
            $archivePath = Join-Path -Path $env:RUNNER_TEMP -ChildPath "AutoHotkey_$version.zip"
            $downloadUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$version/AutoHotkey_$version.zip"

            Write-Host "Downloading AutoHotkey portable runtime from $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath

            $expectedArchiveSha256 = $env:AHK_RUNTIME_ZIP_SHA256.ToLowerInvariant()
            $actualArchiveSha256 = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualArchiveSha256 -ne $expectedArchiveSha256) {
              throw "E_AHK_RUNTIME_HASH_MISMATCH: AutoHotkey archive hash mismatch. expected=$expectedArchiveSha256 actual=$actualArchiveSha256 archivePath=$archivePath"
            }

            Expand-Archive -Path $archivePath -DestinationPath $installRoot -Force
          }

          if (-not (Test-Path -Path $exePath -PathType Leaf)) {
            throw "E_AHK_RUNTIME_UNAVAILABLE: Expected AutoHotkey64.exe at '$exePath' after setup."
          }

          $expectedExeSha256 = $env:AHK_RUNTIME_EXE_SHA256.ToLowerInvariant()
          $actualExeSha256 = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualExeSha256 -ne $expectedExeSha256) {
            throw "E_AHK_RUNTIME_HASH_MISMATCH: AutoHotkey executable hash mismatch. expected=$expectedExeSha256 actual=$actualExeSha256 exePath=$exePath"
          }

          $installRoot >> $env:GITHUB_PATH
          Write-Host "AutoHotkey runtime ready at: $exePath"

      - name: Run Windows language checks (full repository)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $start = Get-Date
          ./Scripts/Utils/Quality/Invoke-WindowsLanguageChecks.ps1 -RequireAutoHotkey
          $elapsedSeconds = [int]([Math]::Round(((Get-Date) - $start).TotalSeconds, 0))

          Write-Host "Nightly Windows language checks duration: $elapsedSeconds seconds"
          "Nightly Windows checks duration: $elapsedSeconds seconds" >> $env:GITHUB_STEP_SUMMARY

      - name: Assert clean tree after nightly Windows checks
        shell: pwsh
        run: ./Scripts/Utils/Quality/Assert-CleanGitTree.ps1 -Context "Windows language checks (nightly deep lane)"

  macos-language:
    name: macOS AppleScript validation
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run macOS language checks
        shell: bash
        run: ./Scripts/Utils/Quality/Invoke-MacOSLanguageChecks.sh

      - name: Assert clean tree after macOS checks
        shell: pwsh
        run: ./Scripts/Utils/Quality/Assert-CleanGitTree.ps1 -Context "macOS language checks"

  powershell-compat-analyzer:
    name: PowerShell cross-version compat gate (static)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: ./Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1 -Modules PSScriptAnalyzer

      - name: Run cross-version compatibility gate (5.1 + 7+)
        shell: pwsh
        run: ./Scripts/Utils/Quality/Invoke-CompatibilityChecks.ps1

  powershell-tests-winps51:
    name: PowerShell tests (Windows PowerShell 5.1)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Report PowerShell edition under test
        shell: powershell
        run: |
          Write-Host ("Edition: {0}  Version: {1}" -f $PSVersionTable.PSEdition, $PSVersionTable.PSVersion)

      - name: Resolve Windows PowerShell 5.1 user module path
        id: psmodpath
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $documents = [Environment]::GetFolderPath("MyDocuments")
          $modulePath = Join-Path -Path $documents -ChildPath "WindowsPowerShell\Modules"
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "modulePath=$modulePath`n", [System.Text.UTF8Encoding]::new($false))

      - name: Cache Windows PowerShell 5.1 modules
        uses: actions/cache@v6.0.0
        with:
          path: ${{ steps.psmodpath.outputs.modulePath }}
          key: psmodules-${{ runner.os }}-winps51-${{ hashFiles('Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1') }}
          restore-keys: |
            psmodules-${{ runner.os }}-winps51-

      - name: Install Pester 5 (Windows PowerShell 5.1)
        shell: powershell
        run: ./Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1 -Modules Pester

      - name: Run Pester suite under Windows PowerShell 5.1
        shell: powershell
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          $start = Get-Date
          try {
            $pesterGateScript = Join-Path -Path (Get-Location).Path -ChildPath "Scripts/Utils/Quality/Invoke-PesterQualityGate.ps1"
            if (-not (Test-Path -Path $pesterGateScript -PathType Leaf)) {
              throw "E_CI_PESTER_GATE_SCRIPT_MISSING: Pester quality gate script not found at '$pesterGateScript'."
            }
            $winPs51TestPaths = @(
              "Tests/Utils/WindowsPowerShell51RuntimeSmoke.Tests.ps1",
              "Tests/Utils/CompatibilityHelpers.Tests.ps1",
              "Tests/Utils/CompatibilityConventions.Tests.ps1",
              "Tests/Utils/Install-PowerShellQualityModules.Tests.ps1",
              "Tests/GitHub/Get-UnresolvedPRComments.Tests.ps1"
            )
            & $pesterGateScript -TestPath $winPs51TestPaths -OutputVerbosity None -DiagnosticsPrefix "WinPS5.1 Pester" -TestResultOutputPath "testresults-winps51.xml"
          } finally {
            $elapsedSeconds = [int]([Math]::Round(((Get-Date) - $start).TotalSeconds, 0))
            Write-Host "Windows PowerShell 5.1 Pester duration: $elapsedSeconds seconds"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pester-winps51
          path: testresults-winps51.xml
          if-no-files-found: ignore

  powershell-tests-pwsh7:
    name: PowerShell tests (PowerShell 7+)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Report PowerShell edition under test
        shell: pwsh
        run: |
          Write-Host ("Edition: {0}  Version: {1}" -f $PSVersionTable.PSEdition, $PSVersionTable.PSVersion)

      - name: Resolve PowerShell 7+ user module path
        id: psmodpath
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $documents = [Environment]::GetFolderPath("MyDocuments")
          $modulePath = Join-Path -Path $documents -ChildPath "PowerShell/Modules"
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "modulePath=$modulePath`n", [System.Text.UTF8Encoding]::new($false))

      - name: Cache PowerShell 7+ modules
        uses: actions/cache@v6.0.0
        with:
          path: ${{ steps.psmodpath.outputs.modulePath }}
          key: psmodules-${{ runner.os }}-pwsh7-${{ hashFiles('Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1') }}
          restore-keys: |
            psmodules-${{ runner.os }}-pwsh7-

      - name: Install Pester 5 (PowerShell 7+)
        shell: pwsh
        run: ./Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1 -Modules Pester

      - name: Run Pester suite under PowerShell 7+
        shell: pwsh
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          $start = Get-Date
          try {
            $pesterGateScript = Join-Path -Path (Get-Location).Path -ChildPath "Scripts/Utils/Quality/Invoke-PesterQualityGate.ps1"
            if (-not (Test-Path -Path $pesterGateScript -PathType Leaf)) {
              throw "E_CI_PESTER_GATE_SCRIPT_MISSING: Pester quality gate script not found at '$pesterGateScript'."
            }
            & $pesterGateScript -TestPath "Tests" -OutputVerbosity None -DiagnosticsPrefix "PS7+ Pester" -TestResultOutputPath "testresults-pwsh7.xml"
          } finally {
            $elapsedSeconds = [int]([Math]::Round(((Get-Date) - $start).TotalSeconds, 0))
            Write-Host "PowerShell 7+ Pester duration: $elapsedSeconds seconds"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pester-pwsh7
          path: testresults-pwsh7.xml
          if-no-files-found: ignore

  validation-summary:
    name: Validation summary
    if: ${{ always() }}
    needs:
      - precommit-linux
      - windows-language
      - windows-language-nightly
      - macos-language
      - powershell-compat-analyzer
      - powershell-tests-winps51
      - powershell-tests-pwsh7
    runs-on: ubuntu-latest

    steps:
      - name: Summarize validation lane results
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $laneResults = [ordered]@{
            "precommit-linux"        = "${{ needs.precommit-linux.result }}"
            "windows-language"       = "${{ needs.windows-language.result }}"
            "windows-language-nightly" = "${{ needs.windows-language-nightly.result }}"
            "macos-language"         = "${{ needs.macos-language.result }}"
            "powershell-compat-analyzer" = "${{ needs.powershell-compat-analyzer.result }}"
            "powershell-tests-winps51" = "${{ needs.powershell-tests-winps51.result }}"
            "powershell-tests-pwsh7" = "${{ needs.powershell-tests-pwsh7.result }}"
          }

          $failedLanes = @()
          foreach ($laneName in $laneResults.Keys) {
            $result = $laneResults[$laneName]
            Write-Host "$laneName => $result"

            if ($result -eq "failure" -or $result -eq "cancelled") {
              $failedLanes += $laneName
            }
          }

          "## Script Quality Validation Summary" >> $env:GITHUB_STEP_SUMMARY
          foreach ($laneName in $laneResults.Keys) {
            "- ${laneName}: $($laneResults[$laneName])" >> $env:GITHUB_STEP_SUMMARY
          }

          if ($failedLanes.Count -gt 0) {
            throw "E_VALIDATION_SUMMARY_FAILED: failing lanes detected ($($failedLanes -join ', '))."
          }
