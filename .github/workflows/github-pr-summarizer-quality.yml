name: GitHub Utility Quality

on:
  pull_request:
    paths:
      - "Scripts/Utils/GitHub/**"
      - "Tests/GitHub/**"
      - "Scripts/Utils/Common/CompatibilityHelpers.ps1"
      - "Scripts/Utils/Common/ModuleHelpers.ps1"
      - "Scripts/Utils/Common/StrictModeHelpers.ps1"
      - "Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1"
      - "Scripts/Utils/Quality/Invoke-PesterQualityGate.ps1"
      - ".github/workflows/github-pr-summarizer-quality.yml"
  push:
    branches: [main, master]
    paths:
      - "Scripts/Utils/GitHub/**"
      - "Tests/GitHub/**"
      - "Scripts/Utils/Common/CompatibilityHelpers.ps1"
      - "Scripts/Utils/Common/ModuleHelpers.ps1"
      - "Scripts/Utils/Common/StrictModeHelpers.ps1"
      - "Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1"
      - "Scripts/Utils/Quality/Invoke-PesterQualityGate.ps1"
      - ".github/workflows/github-pr-summarizer-quality.yml"

jobs:
  github-utility-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup PowerShell modules
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          ./Scripts/Utils/Quality/Install-PowerShellQualityModules.ps1 -Modules Pester
          Import-Module Pester -MinimumVersion 5.5.0 -ErrorAction Stop

          $pesterVersion = (Get-Module Pester | Select-Object -First 1 -ExpandProperty Version)
          Write-Host "Pester version: $pesterVersion"

      - name: Run GitHub utility Pester with coverage
        shell: pwsh
        timeout-minutes: 10
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $repoRoot = (Get-Location).Path
          $pesterGateScript = Join-Path -Path $repoRoot -ChildPath "Scripts/Utils/Quality/Invoke-PesterQualityGate.ps1"
          $testPath = Join-Path -Path $repoRoot -ChildPath "Tests/GitHub"
          $coveragePath = Join-Path -Path $repoRoot -ChildPath "Scripts/Utils/GitHub/Get-UnresolvedPRComments.ps1"
          $testResultPath = Join-Path -Path $repoRoot -ChildPath "testresults-github.xml"
          if (-not (Test-Path -Path $pesterGateScript -PathType Leaf)) {
            throw "E_CI_PESTER_GATE_SCRIPT_MISSING: Pester quality gate script not found at '$pesterGateScript'."
          }

          & $pesterGateScript -TestPath $testPath -EnableCoverage -CoveragePath $coveragePath -MinimumCoveragePercent 75 -DiagnosticsPrefix "GitHub Utility Pester" -TestResultOutputPath $testResultPath

      - name: Upload Pester test results
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pester-results-github-utility
          path: testresults-github.xml
          if-no-files-found: ignore
