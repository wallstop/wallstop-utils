minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '^(Config/(PowerToys/|\.config/).*|.*\.(bat|cmd))$'
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys, --indent, "2"]
        files: '^(Config/Komorebi/(komorebi|komorebi\.bar)\.json|Config/WindowsTerminal/settings\.json|Config/scoopfile\.json)$'

  - repo: local
    hooks:
      - id: stylua
        name: stylua
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Invoke-NativeQualityChecks.ps1 -Tool stylua -Fix
        language: system
        files: '^Config/Wezterm/wezterm\.lua$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: actionlint
        name: actionlint
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Invoke-NativeQualityChecks.ps1 -Tool actionlint
        language: system
        files: '^\.github/workflows/.*\.(yml|yaml)$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: shfmt
        name: shfmt
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Invoke-ShellQualityChecks.ps1 -Tool shfmt -Fix
        language: system
        files: '^(Scripts/.*\.sh|\.devcontainer/.*\.sh|\.githooks/(pre-commit|pre-push))$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: shellcheck
        name: shellcheck
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Invoke-ShellQualityChecks.ps1 -Tool shellcheck
        language: system
        files: '^(Scripts/.*\.sh|\.devcontainer/.*\.sh|\.githooks/(pre-commit|pre-push))$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: powershell-format
        name: powershell-format
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Format-PowerShellFiles.ps1
        language: system
        files: '^(Scripts|Tests|Config/Powershell)/.*\.ps1$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: powershell-precommit-validation
        name: powershell-precommit-validation
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Run-PreCommitValidation.ps1
        language: system
        files: '^(Scripts/Utils/.*\.ps1|Tests/Utils/.*\.Tests\.ps1|Tests/GitHub/.*\.ps1|Config/Powershell/.*\.ps1|Scripts/AutoHotKey/.*\.ahk|Config/\.config/.*\.ahk|Scripts/.*\.bat|Scripts/.*\.sh|\.devcontainer/.*\.sh|\.githooks/(pre-commit|pre-push)|Config/Wezterm/wezterm\.lua|\.github/workflows/.*\.(yml|yaml)|\.llm/.*\.md|AGENTS\.md|CLAUDE\.md|\.github/copilot-instructions\.md|\.github/dependabot\.yml|\.pre-commit-config\.yaml|\.gitattributes|\.editorconfig|\.gitignore|requirements\.txt|\.psscriptanalyzer(\.format)?\.psd1|\.shellcheckrc|\.stylua\.toml|Scripts/Utils/Quality/(native-quality-tools|shell-quality-tools|precommit-cli-tools)\.json)$'
        pass_filenames: false
        stages: [pre-commit]
      - id: powershell-prepush-validation
        name: powershell-prepush-validation
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Invoke-PrePushPreCommitValidation.ps1
        language: system
        pass_filenames: true
        stages: [pre-push]
      - id: llm-skills-index-check
        name: llm-skills-index-check
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Update-LlmSkillsIndex.ps1 -Check
        language: system
        files: '^\.llm/(skills-index\.md|skills/.*\.md)$'
        pass_filenames: false
        stages: [pre-commit, pre-push]
