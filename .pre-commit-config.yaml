minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: '^Config/(PowerToys/|\.config/)'
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys, --indent, '2']
        files: '^(Config/Komorebi/(komorebi|komorebi\.bar)\.json|Config/WindowsTerminal/settings\.json|Config/scoopfile\.json)$'

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.0-1
    hooks:
      - id: shfmt
        args: [-w, -i, '2', -ci, -sr]
        files: '^(Scripts/.*\.sh|\.githooks/(pre-commit|pre-push))$'
        stages: [pre-commit]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '^(Scripts/.*\.sh|\.githooks/(pre-commit|pre-push))$'
        stages: [pre-commit]

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v0.20.0
    hooks:
      - id: stylua
        args: [--config-path, .stylua.toml]
        files: '^Config/Wezterm/wezterm\.lua$'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier-yaml
        types_or: [yaml]
        files: '^(\.github/workflows/.*\.(yml|yaml)|Config/Komorebi/applications\.yaml)$'

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: '^\.github/workflows/.*\.(yml|yaml)$'

  - repo: local
    hooks:
      - id: powershell-format
        name: powershell-format
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Quality/Format-PowerShellFiles.ps1
        language: system
        files: '^(Scripts|Tests)/.*\.ps1$'
        pass_filenames: true
        require_serial: true
        stages: [pre-commit]
      - id: powershell-precommit-validation
        name: powershell-precommit-validation
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Run-PreCommitValidation.ps1
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: powershell-prepush-validation
        name: powershell-prepush-validation
        entry: pwsh -NoLogo -NoProfile -File Scripts/Utils/Run-PreCommitValidation.ps1 -All
        language: system
        pass_filenames: false
        stages: [pre-push]
